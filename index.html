<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>એડમિશન મેનેજમેન્ટ - પ્રાથમિક શાળા વાંકાનેર</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;700&display=swap');
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { font-family: 'Hind Vadodara', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a5276; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.3); width: 320px; }
        .nav-bar { background: #1a5276; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-btns { display: flex; gap: 10px; }
        .nav-btn { padding: 6px 12px; border: 1px solid white; background: transparent; color: white; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .logout-btn { background: #e74c3c; border: none; }
        .container { width: 210mm; min-height: 297mm; margin: 10px auto; background: white; padding: 8mm; border: 2px solid #000; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .header-main { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 12px; }
        .school-logo { width: 85px; height: 85px; object-fit: contain; border: 1px solid #ccc; cursor: pointer; }
        .school-title { flex-grow: 1; text-align: center; }
        .school-name { font-size: 24px; margin: 0; font-weight: bold; color: #1a5276; }
        fieldset { border: 1.5px solid #000; border-radius: 5px; padding: 10px; margin-bottom: 10px; width: 100%; }
        legend { font-weight: bold; padding: 0 8px; font-size: 13px; }
        .personal-info-wrapper { display: flex; gap: 15px; }
        .form-fields { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .student-photo-area { width: 110px; text-align: center; }
        .student-preview { width: 100px; height: 120px; border: 1.5px solid #000; object-fit: cover; background: #f9f9f9; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 5px; }
        label { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
        input, select, textarea { padding: 6px; border: 1px solid #000; border-radius: 3px; font-size: 12.5px; font-family: 'Hind Vadodara'; width: 100%; }
        .signature-section { display: flex; justify-content: space-between; margin-top: auto; padding: 40px 20px 20px 20px; }
        .sig-box { text-align: center; border-top: 1.5px solid #000; width: 180px; padding-top: 5px; font-weight: bold; font-size: 14px; }
        .admin-panel { max-width: 210mm; margin: 20px auto; background: #fff; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        .student-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .student-table th, .student-table td { border: 1px solid #ddd; padding: 6px; text-align: left; font-size: 13px; }
        .student-table th { background-color: #3498db; color: white; }
        .action-btn { padding: 4px 8px; cursor: pointer; border: none; border-radius: 3px; color: white; }
        .edit-btn { background: #2980b9; }
        .delete-btn { background: #c0392b; }
        .btn-container { max-width: 210mm; margin: 10px auto; display: flex; gap: 10px; padding-bottom: 40px; }
        .main-btn { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        @media print {
            #loginOverlay, .nav-bar, .admin-panel, .btn-container, .photo-label, input[type="file"], .doc-upload-section { display: none !important; }
            body { background: white; }
            .container { margin: 0 auto; border: 2px solid #000; box-shadow: none; height: 290mm; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>🔐 શાળા લોગિન</h3>
        <input type="password" id="passInput" placeholder="પાસવર્ડ નાખો" style="padding: 10px; width: 100%; margin-bottom: 15px;">
        <button onclick="checkLogin()" style="background: #27ae60; color:white; border:none; padding:10px; width:100%; cursor:pointer; font-weight:bold; border-radius:5px;">Login (પ્રવેશ)</button>
        <p id="loginError" style="color: red; display: none; font-size: 12px; margin-top:10px;">ખોટો પાસવર્ડ!</p>
    </div>
</div>

<div class="nav-bar">
    <span><b>વાંકાનેર પ્રાથમિક શાળા - પોર્ટલ</b></span>
    <div class="nav-btns">
        <button class="nav-btn" onclick="changePassword()">પાસવર્ડ બદલો</button>
        <button class="nav-btn logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="admin-panel">
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="text" id="searchInput" placeholder="નામ કે આધારથી શોધો..." onkeyup="searchStudent()" style="flex: 1; padding: 8px; border:1px solid #ccc; border-radius:4px;">
        <button onclick="exportToExcel()" style="background:#27ae60; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">📊 Excel એક્સપોર્ટ</button>
    </div>
    <div style="max-height: 200px; overflow-y: auto;">
        <table class="student-table" id="studentTable">
            <thead>
                <tr><th>નામ</th><th>આધાર</th><th>ધોરણ</th><th>એક્શન</th></tr>
            </thead>
            <tbody id="studentListBody"></tbody>
        </table>
    </div>
</div>

<div class="container" id="printableForm">
    <div class="header-main">
        <img src="https://via.placeholder.com/100?text=LOGO" id="schoolLogo" class="school-logo" onclick="document.getElementById('logoInput').click()">
        <input type="file" id="logoInput" style="display:none" onchange="previewImg(this, 'schoolLogo')">
        <div class="school-title">
            <h1 class="school-name">પ્રાથમિક શાળા વાંકાનેર</h1>
            <p style="margin:2px">તા. બારડોલી, જિ. સુરત | ૨૦૨૬-૨૭</p>
            <strong>વિદ્યાર્થી પ્રવેશ અરજી ફોર્મ</strong>
        </div>
        <div style="width: 85px;"></div>
    </div>

    <form id="admissionForm">
         <fieldset>
            <legend>વ્યક્તિગત વિગત</legend>
            <div class="personal-info-wrapper">
                <div class="form-fields">
                    <div class="form-group"><label>નામ (ગુજરાતી):</label><input type="text" id="name_guj"></div>
                    <div class="form-group"><label>લિંગ:</label>
                        <select id="gender"><option value="">--પસંદ કરો--</option><option value="કુમાર">કુમાર</option><option value="કન્યા">કન્યા</option></select>
                    </div>
                    <div class="form-group"><label>પિતાનું નામ:</label><input type="text" id="father_name"></div>
                    <div class="form-group"><label>માતાનું નામ:</label><input type="text" id="mother_name"></div>
                </div>
                <div class="student-photo-area">
                    <img src="" id="studentPreview" class="student-preview">
                    <label class="photo-label" style="font-size:10px; color:blue; cursor:pointer;">ફોટો અપલોડ<input type="file" id="photoInput" style="display:none" onchange="previewImg(this, 'studentPreview')"></label>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>જન્મ અને ઓળખ</legend>
            <div class="grid-3">
                <div class="form-group"><label>જન્મ તારીખ:</label><input type="date" id="dob" onchange="convertDateToWords()"></div>
                <div class="form-group" style="grid-column: span 2;"><label>શબ્દોમાં:</label><input type="text" id="dobWords" readonly></div>
                <div class="form-group"><label>જન્મ સ્થળ:</label><input type="text" id="birth_place"></div>
                <div class="form-group"><label>આધાર નંબર:</label><input type="text" id="aadhaar" maxlength="12"></div>
                <div class="form-group"><label>APAAR ID:</label><input type="text" id="apaar_id"></div>
            </div>
        </fieldset>

        <fieldset>
            <legend>શાળાકીય અને સામાજિક</legend>
            <div class="grid-3">
                <div class="form-group"><label>જ્ઞાતિ/પેટાજ્ઞાતિ:</label><input type="text" id="gyati"></div>
                <div class="form-group"><label>કેટેગરી:</label><select id="category"><option>General</option><option>OBC</option><option>SC</option><option>ST</option></select></div>
                <div class="form-group"><label>જી.આર. નં.:</label><input type="text" id="gr_no"></div>
                <div class="form-group"><label>દાખલ ધોરણ:</label><select id="std"><option>બાલવાટિકા</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div>
                <div class="form-group"><label>મોબાઈલ:</label><input type="text" id="mobile"></div>
                <div class="form-group"><label>દાખલ તારીખ:</label><input type="date" id="admission_date"></div>
                <div class="form-group"><label>UDISE:</label><input type="text" id="udise"></div>
            </div>
        </fieldset>

        <fieldset>
            <legend>રહેઠાણ અને બેંક</legend>
            <div class="grid-2">
                <div class="form-group"><label>સરનામું:</label><textarea id="address" rows="1"></textarea></div>
                <div class="form-group"><label>બેંક નામ:</label><input type="text" id="bank_name"></div>
                <div class="form-group"><label>એકાઉન્ટ નં.:</label><input type="text" id="acc"></div>
                <div class="form-group"><label>IFSC:</label><input type="text" id="ifsc"></div>
            </div>
        </fieldset>
        <fieldset class="doc-upload-section">
            <legend>દસ્તાવેજ અપલોડ (માત્ર ફોર્મ સેવિંગ માટે)</legend>
            <div class="doc-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                <div class="form-group"><label>આધાર (વિદ્યાર્થી):</label><input type="file"></div>
                <div class="form-group"><label>આધાર (પિતા):</label><input type="file"></div>
                <div class="form-group"><label>રેશન કાર્ડ:</label><input type="file"></div>
                <div class="form-group"><label>પાસબુક:</label><input type="file"></div>
                <div class="form-group"><label>જાતિનો દાખલો:</label><input type="file"></div>
                <div class="form-group"><label>જન્મનો દાખલો:</label><input type="file"></div>
            </div>
        </fieldset>


        <div class="signature-section">
            <div class="sig-box">વાલીની સહી</div>
            <div class="sig-box">આચાર્યશ્રીની સહી</div>
        </div>
    </form>
</div>

<div class="btn-container">
    <button class="main-btn" style="background: #3498db;" onclick="saveData()">💾 ડેટા સેવ કરો</button>
    <button class="main-btn" style="background: #e74c3c;" onclick="window.print()">🖨️ પ્રિન્ટ / PDF</button>
    <button class="main-btn" style="background: #95a5a6;" onclick="location.reload()">🔄 નવું ફોર્મ</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-UQnDMg8kpkpWR5FkQAYosBa6J09WY3c",
        authDomain: "suratvankaner-school-app.firebaseapp.com",
        projectId: "suratvankaner-school-app",
        storageBucket: "suratvankaner-school-app.firebasestorage.app",
        messagingSenderId: "659581665519",
        appId: "1:659581665519:web:3128bfa83b6fd31f2bdb1a"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let students = [];

    // મહત્વનું: Firebase માંથી ડેટા ફેચ કરવાનું ફંક્શન
    function fetchAllData() {
        database.ref('students').on('value', snap => {
            const data = snap.val();
            students = [];
            if(data) {
                for(let id in data) {
                    students.push(data[id]);
                }
            }
            localStorage.setItem('school_db', JSON.stringify(students));
            renderList();
        });
    }

    function checkLogin() {
        const input = document.getElementById('passInput').value;
        database.ref('admin/password').once('value', snap => {
            const correctPass = snap.val() || "school123";
            if(input === correctPass) {
                document.getElementById('loginOverlay').style.display = 'none';
                sessionStorage.setItem("isLoggedIn", "true");
                fetchAllData(); // લોગિન થતા જ બધો ડેટા લોડ કરો
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });
    }

    function logout() {
        if(confirm("શું તમે લોગ આઉટ કરવા માંગો છો?")) {
            sessionStorage.removeItem("isLoggedIn");
            location.reload();
        }
    }

    function changePassword() {
        const newPass = prompt("નવો પાસવર્ડ નાખો:");
        if(newPass && newPass.length >= 4) {
            database.ref('admin/password').set(newPass).then(() => alert("પાસવર્ડ સફળતાપૂર્વક બદલાયો!"));
        }
    }

    function previewImg(input, id) {
        if (input.files && input.files[0]) {
            let r = new FileReader();
            r.onload = e => document.getElementById(id).src = e.target.result;
            r.readAsDataURL(input.files[0]);
        }
    }

    function convertDateToWords() {
        const d = new Date(document.getElementById('dob').value);
        const months = ["જાન્યુઆરી", "ફેબ્રુઆરી", "માર્ચ", "એપ્રિલ", "મે", "જૂન", "જુલાઈ", "ઓગસ્ટ", "સપ્ટેમ્બર", "ઓક્ટોબર", "નવેમ્બર", "ડિસેમ્બર"];
        if(!isNaN(d)) document.getElementById('dobWords').value = d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
    }

    function saveData() {
        let form = document.getElementById('admissionForm');
        let data = {};
        Array.from(form.elements).forEach(el => { if(el.id) data[el.id] = el.value; });
        if(!data.name_guj || !data.aadhaar) return alert('નામ અને આધાર જરૂરી છે!');

        database.ref('students/' + data.aadhaar).set(data).then(() => {
            alert('સેવ સફળ!');
            form.reset();
            document.getElementById('studentPreview').src = '';
        });
    }

    function renderList() {
        const tbody = document.getElementById('studentListBody');
        tbody.innerHTML = '';
        students.forEach((s, i) => {
            tbody.innerHTML += `<tr>
                <td>${s.name_guj}</td>
                <td>${s.aadhaar}</td>
                <td>${s.std}</td>
                <td>
                    <button class="action-btn edit-btn" onclick="loadStudent('${s.aadhaar}')">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteStudent('${s.aadhaar}')">Del</button>
                </td>
            </tr>`;
        });
    }

    function loadStudent(aadhaar) {
        let s = students.find(item => item.aadhaar === aadhaar);
        if(s) {
            for(let k in s) if(document.getElementById(k)) document.getElementById(k).value = s[k];
            convertDateToWords();
            window.scrollTo({top: 500, behavior: 'smooth'});
        }
    }

    function deleteStudent(id) {
        if(confirm('ડિલીટ કરવું છે?')) {
            database.ref('students/' + id).remove().then(() => alert('ડિલીટ સફળ!'));
        }
    }

    function searchStudent() {
        let v = document.getElementById('searchInput').value.toLowerCase();
        let rs = document.getElementById('studentListBody').getElementsByTagName('tr');
        Array.from(rs).forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? '' : 'none');
    }

    function exportToExcel() {
        if(students.length === 0) return alert("કોઈ ડેટા નથી!");
        let headers = "નામ,લિંગ,પિતાનું નામ,માતાનું નામ,જન્મ તારીખ,જન્મ સ્થળ,આધાર નંબર,જ્ઞાતિ,કેટેગરી,ધોરણ,મોબાઈલ\n";
        let csv = "\ufeff" + headers;
        students.forEach(s => {
            csv += `"${s.name_guj}","${s.gender}","${s.father_name}","${s.mother_name}","${s.dob}","${s.birth_place}","${s.aadhaar}","${s.gyati}","${s.category}","${s.std}","${s.mobile}"\n`;
        });
        let b = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
        let a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = "Vankaner_Students.csv";
        a.click();
    }

    window.onload = () => {
        if(sessionStorage.getItem("isLoggedIn")) {
            document.getElementById('loginOverlay').style.display = 'none';
            fetchAllData();
        }
    };
</script>
</body>
</html>
